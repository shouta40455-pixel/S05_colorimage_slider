<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VFX Image Comparison Slider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="slider-container">
    <img src="S05_colorImage_Before.png" alt="Before" class="image-before">

    <div class="image-after-wrap">
      <img src="S05_colorImage_03.png" alt="After" class="image-after">
    </div>

    <input type="range" min="0" max="100" value="50" class="slider" id="comparison-slider">
    
    <div class="slider-button" id="slider-button"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
