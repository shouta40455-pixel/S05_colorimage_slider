<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コンポジット進捗報告02</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>コンポジット進捗報告02</h1>

  <h2 class="section-title">1カット完成コンポジットビフォーアフター</h2>
  <div class="slider-container" id="group1">
    <img src="Onecut_before.png" alt="Onecut Before" class="image-before">

    <div class="image-after-wrap">
      <img src="Onecut_after.png" alt="Onecut After" class="image-after">
    </div>

    <input type="range" min="0" max="100" value="50" class="slider">
    
    <div class="slider-button"></div>
  </div>


  <h2 class="section-title">Volumetric Fogによる柔らかな光の表現</h2>
  <div class="slider-container" id="group2">
    <img src="Volumet_before.png" alt="Volumet Before" class="image-before">

    <div class="image-after-wrap">
      <img src="Volumet_after.png" alt="Volumet After" class="image-after">
    </div>

    <input type="range" min="0" max="100" value="50" class="slider">
    
    <div class="slider-button"></div>
  </div>


  <h2 class="section-title">S05(朝のシーン)のカラーグレーディングイメージ</h2>
  <div class="slider-container" id="group3">
    <img src="S05_colorimage_before.png" alt="S05 Colorimage Before" class="image-before">

    <div class="image-after-wrap">
      <img src="S05_colorimage_after.png" alt="S05 Colorimage After" class="image-after">
    </div>

    <input type="range" min="0" max="100" value="50" class="slider">
    
    <div class="slider-button"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
